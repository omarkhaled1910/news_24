# fly.toml app configuration file for news-24
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'news-24'
primary_region = 'iad'

[build]
  # Build args no longer needed - DATABASE_URL is set in Dockerfile
  # PAYLOAD_SECRET will be set as a secret

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# Persistent volume for MongoDB data
[mounts]
  source = "mongo_data"
  destination = "/data/db"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
