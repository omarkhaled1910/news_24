# fly.toml app configuration file for news-24
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'news-24'
primary_region = 'iad'

[build]
  [build.args]
    DATABASE_URL = ''  # Will be set from secrets during deploy
    PAYLOAD_SECRET = ''  # Will be set from secrets during deploy

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
